spring:
  application:
    name: student-profile-api
  datasource:
    url: jdbc:h2:mem:my_university_db;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true

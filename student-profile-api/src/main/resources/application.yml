server:
  port: 8081
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${JWKS_URI:http://localhost:8082/oauth2/jwks}
  application:
    name: student-profile-api
  # Allow the controller to handle JSON correctly
  jackson:
    serialization:
      indent_output: true
  datasource:
    url: jdbc:h2:mem:my_university_db;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
#  jpa:
#    database-platform: org.hibernate.dialect.H2Dialect
#    hibernate:
#      ddl-auto: update # Automatically creates tables based on your @Entity
#    show-sql: true # Helpful for learning: see the SQL in the logs
logging:
  level:
    org.springframework.security: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "health,info"
  endpoint:
    health:
      show-details: always
